<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="420" fill="#0f1117" rx="16"/>
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Como o Claude Code Pensa: O Loop Agêntico</text>
  <text x="400" y="62" text-anchor="middle" fill="#718096" font-size="12">O que acontece por baixo dos panos a cada mensagem sua</text>

  <!-- Step boxes -->
  <!-- Step 1: You -->
  <rect x="60" y="100" width="130" height="64" rx="10" fill="#1a3a5c"/>
  <text x="125" y="126" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="700">① VOCÊ</text>
  <text x="125" y="144" text-anchor="middle" fill="#a0aec0" font-size="11">"Corrija o bug</text>
  <text x="125" y="158" text-anchor="middle" fill="#a0aec0" font-size="11">em auth.ts"</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="132" x2="230" y2="132" stroke="#4a9eff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Raciocina -->
  <rect x="230" y="100" width="130" height="64" rx="10" fill="#1a4a2e"/>
  <text x="295" y="126" text-anchor="middle" fill="#48bb78" font-size="11" font-weight="700">② RACIOCINA</text>
  <text x="295" y="144" text-anchor="middle" fill="#a0aec0" font-size="11">Qual arquivo ler?</text>
  <text x="295" y="158" text-anchor="middle" fill="#a0aec0" font-size="11">Qual ferramenta usar?</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="132" x2="400" y2="132" stroke="#48bb78" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 3: Age -->
  <rect x="400" y="100" width="130" height="64" rx="10" fill="#3a1a4a"/>
  <text x="465" y="126" text-anchor="middle" fill="#b794f4" font-size="11" font-weight="700">③ AGE</text>
  <text x="465" y="144" text-anchor="middle" fill="#a0aec0" font-size="11">Lê arquivo</text>
  <text x="465" y="158" text-anchor="middle" fill="#a0aec0" font-size="11">Roda comando</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="132" x2="570" y2="132" stroke="#b794f4" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 4: Observa -->
  <rect x="570" y="100" width="130" height="64" rx="10" fill="#4a2a1a"/>
  <text x="635" y="126" text-anchor="middle" fill="#ed8936" font-size="11" font-weight="700">④ OBSERVA</text>
  <text x="635" y="144" text-anchor="middle" fill="#a0aec0" font-size="11">Leu o resultado?</text>
  <text x="635" y="158" text-anchor="middle" fill="#a0aec0" font-size="11">Erro? Sucesso?</text>

  <!-- Loop back arrow -->
  <path d="M 635 164 Q 635 240 465 240 Q 295 240 295 164" stroke="#ed8936" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arr4)"/>
  <text x="465" y="258" text-anchor="middle" fill="#718096" font-size="11">🔁 Repete até a tarefa estar completa</text>

  <!-- Final arrow down -->
  <line x1="635" y1="100" x2="635" y2="80" stroke="#48bb78" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="650" y="77" fill="#48bb78" font-size="10">Concluído!</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#48bb78"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b794f4"/>
    </marker>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ed8936"/>
    </marker>
  </defs>

  <!-- Tools list -->
  <rect x="60" y="290" width="680" height="100" rx="10" fill="#16181f"/>
  <text x="400" y="314" text-anchor="middle" fill="#718096" font-size="11" font-weight="700">🛠 FERRAMENTAS QUE CLAUDE USA AUTOMATICAMENTE</text>
  <text x="130" y="340" text-anchor="middle" fill="#4a9eff" font-size="22">📄</text>
  <text x="130" y="362" text-anchor="middle" fill="#a0aec0" font-size="11">Ler Arquivos</text>
  <text x="250" y="340" text-anchor="middle" fill="#48bb78" font-size="22">✏️</text>
  <text x="250" y="362" text-anchor="middle" fill="#a0aec0" font-size="11">Editar Código</text>
  <text x="370" y="340" text-anchor="middle" fill="#b794f4" font-size="22">⚡</text>
  <text x="370" y="362" text-anchor="middle" fill="#a0aec0" font-size="11">Rodar Comandos</text>
  <text x="490" y="340" text-anchor="middle" fill="#ed8936" font-size="22">🔍</text>
  <text x="490" y="362" text-anchor="middle" fill="#a0aec0" font-size="11">Buscar no Código</text>
  <text x="620" y="340" text-anchor="middle" fill="#fc8181" font-size="22">🌐</text>
  <text x="620" y="362" text-anchor="middle" fill="#a0aec0" font-size="11">Chamar APIs (MCP)</text>
  <text x="740" y="340" text-anchor="middle" fill="#fbd38d" font-size="22">🤖</text>
  <text x="740" y="362" text-anchor="middle" fill="#a0aec0" font-size="11">Criar Subagents</text>
</svg>
