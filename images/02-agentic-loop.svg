<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="460" fill="#F0EEE6"/>
  <text x="60" y="58" fill="#1F1E1D" font-family="Georgia, serif" font-size="27">Como o Claude Code pensa: o loop agêntico</text>
  <text x="60" y="84" fill="#73726C" font-family="Arial, sans-serif" font-size="14">O que acontece por baixo dos panos a cada mensagem sua</text>
  <line x1="60" y1="100" x2="800" y2="100" stroke="#DAD6C9" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="60" y="128" width="170" height="78" rx="12" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="80" y="156" fill="#CC785C" font-family="Arial, sans-serif" font-size="12" font-weight="700">1 · VOCÊ</text>
  <text x="80" y="180" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">"Corrija o bug</text>
  <text x="80" y="197" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">em auth.ts"</text>

  <line x1="230" y1="167" x2="270" y2="167" stroke="#CC785C" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="272" y="128" width="170" height="78" rx="12" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="292" y="156" fill="#AB5A38" font-family="Arial, sans-serif" font-size="12" font-weight="700">2 · RACIOCINA</text>
  <text x="292" y="180" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">Qual arquivo ler?</text>
  <text x="292" y="197" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">Qual ferramenta usar?</text>

  <line x1="442" y1="167" x2="482" y2="167" stroke="#CC785C" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="484" y="128" width="146" height="78" rx="12" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="504" y="156" fill="#94492E" font-family="Arial, sans-serif" font-size="12" font-weight="700">3 · AGE</text>
  <text x="504" y="180" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">Lê o arquivo,</text>
  <text x="504" y="197" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">roda comandos</text>

  <line x1="630" y1="167" x2="670" y2="167" stroke="#CC785C" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="672" y="128" width="128" height="78" rx="12" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="692" y="156" fill="#73726C" font-family="Arial, sans-serif" font-size="12" font-weight="700">4 · OBSERVA</text>
  <text x="692" y="180" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">Deu certo?</text>
  <text x="692" y="197" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">Erro? Sucesso?</text>

  <!-- loop back -->
  <path d="M 736 206 Q 736 256 398 256 Q 357 256 357 206" stroke="#CC785C" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#a)"/>
  <text x="430" y="276" text-anchor="middle" fill="#73726C" font-family="Arial, sans-serif" font-size="12.5">↻ Repete até a tarefa estar completa</text>

  <line x1="736" y1="128" x2="736" y2="110" stroke="#788C5D" stroke-width="1.5"/>
  <text x="748" y="121" fill="#5E7345" font-family="Arial, sans-serif" font-size="11">Concluído</text>

  <!-- Tools -->
  <rect x="60" y="306" width="740" height="118" rx="14" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="80" y="334" fill="#1F1E1D" font-family="Georgia, serif" font-size="15">Ferramentas que o Claude usa automaticamente</text>
  <text x="135" y="372" text-anchor="middle" font-size="22">📄</text>
  <text x="135" y="396" text-anchor="middle" fill="#3D3C39" font-family="Arial, sans-serif" font-size="11.5">Ler arquivos</text>
  <text x="260" y="372" text-anchor="middle" font-size="22">✏️</text>
  <text x="260" y="396" text-anchor="middle" fill="#3D3C39" font-family="Arial, sans-serif" font-size="11.5">Editar código</text>
  <text x="385" y="372" text-anchor="middle" font-size="22">⚡</text>
  <text x="385" y="396" text-anchor="middle" fill="#3D3C39" font-family="Arial, sans-serif" font-size="11.5">Rodar comandos</text>
  <text x="510" y="372" text-anchor="middle" font-size="22">🔍</text>
  <text x="510" y="396" text-anchor="middle" fill="#3D3C39" font-family="Arial, sans-serif" font-size="11.5">Buscar no código</text>
  <text x="635" y="372" text-anchor="middle" font-size="22">🌐</text>
  <text x="635" y="396" text-anchor="middle" fill="#3D3C39" font-family="Arial, sans-serif" font-size="11.5">Chamar APIs (MCP)</text>
  <text x="745" y="372" text-anchor="middle" font-size="22">🤖</text>
  <text x="745" y="396" text-anchor="middle" fill="#3D3C39" font-family="Arial, sans-serif" font-size="11.5">Criar subagentes</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#CC785C"/></marker>
  </defs>
</svg>
