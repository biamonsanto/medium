<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="860" height="460" fill="#0f1117" rx="16"/>
  <text x="430" y="40" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Routines — Claude Trabalhando Enquanto Você Dorme</text>
  <text x="430" y="62" text-anchor="middle" fill="#718096" font-size="12">Automações cloud-hosted que executam no schedule, sem você precisar estar presente</text>

  <!-- Timeline -->
  <line x1="60" y1="160" x2="800" y2="160" stroke="#2d3748" stroke-width="2"/>

  <!-- Time markers -->
  <text x="80" y="185" text-anchor="middle" fill="#718096" font-size="11">00:00</text>
  <text x="210" y="185" text-anchor="middle" fill="#718096" font-size="11">06:00</text>
  <text x="340" y="185" text-anchor="middle" fill="#718096" font-size="11">09:00</text>
  <text x="470" y="185" text-anchor="middle" fill="#718096" font-size="11">12:00</text>
  <text x="600" y="185" text-anchor="middle" fill="#718096" font-size="11">18:00</text>
  <text x="730" y="185" text-anchor="middle" fill="#718096" font-size="11">23:59</text>

  <!-- Tick marks -->
  <line x1="80" y1="155" x2="80" y2="165" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="210" y1="155" x2="210" y2="165" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="340" y1="155" x2="340" y2="165" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="470" y1="155" x2="470" y2="165" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="600" y1="155" x2="600" y2="165" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="730" y1="155" x2="730" y2="165" stroke="#4a5568" stroke-width="1.5"/>

  <!-- Routine 1: Security Audit at 06:00 -->
  <line x1="210" y1="100" x2="210" y2="155" stroke="#fc8181" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="130" y="70" width="160" height="54" rx="8" fill="#4a1a1a" stroke="#fc8181" stroke-width="1.5"/>
  <text x="210" y="92" text-anchor="middle" fill="#fc8181" font-size="11" font-weight="700">🔒 Security Audit</text>
  <text x="210" y="108" text-anchor="middle" fill="#a0aec0" font-size="10">Todo dia 06:00</text>
  <text x="210" y="120" text-anchor="middle" fill="#718096" font-size="10">Varredura de vulnerabilidades</text>

  <!-- Routine 2: Dep Update Monday 09:00 -->
  <line x1="340" y1="100" x2="340" y2="155" stroke="#ed8936" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="260" y="70" width="160" height="54" rx="8" fill="#4a2a1a" stroke="#ed8936" stroke-width="1.5"/>
  <text x="340" y="92" text-anchor="middle" fill="#ed8936" font-size="11" font-weight="700">📦 Dep Update</text>
  <text x="340" y="108" text-anchor="middle" fill="#a0aec0" font-size="10">Toda segunda 09:00</text>
  <text x="340" y="120" text-anchor="middle" fill="#718096" font-size="10">Atualiza deps seguras</text>

  <!-- Routine 3: PR Monitor (webhook) -->
  <line x1="470" y1="100" x2="470" y2="155" stroke="#48bb78" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="390" y="70" width="160" height="54" rx="8" fill="#1a4a2e" stroke="#48bb78" stroke-width="1.5"/>
  <text x="470" y="92" text-anchor="middle" fill="#48bb78" font-size="11" font-weight="700">👁️ PR Monitor</text>
  <text x="470" y="108" text-anchor="middle" fill="#a0aec0" font-size="10">A cada novo PR</text>
  <text x="470" y="120" text-anchor="middle" fill="#718096" font-size="10">Code review automático</text>

  <!-- Routine 4: Health Report -->
  <line x1="600" y1="100" x2="600" y2="155" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="520" y="70" width="160" height="54" rx="8" fill="#1a3a5c" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="600" y="92" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="700">📊 Health Report</text>
  <text x="600" y="108" text-anchor="middle" fill="#a0aec0" font-size="10">Dias 1 e 15, 10:00</text>
  <text x="600" y="120" text-anchor="middle" fill="#718096" font-size="10">Saúde do código</text>

  <!-- You sleeping -->
  <rect x="650" y="66" width="170" height="62" rx="10" fill="#16181f" stroke="#2d3748" stroke-width="1"/>
  <text x="735" y="92" text-anchor="middle" font-size="24">😴</text>
  <text x="735" y="113" text-anchor="middle" fill="#718096" font-size="12">Você dormindo</text>
  <text x="735" y="127" text-anchor="middle" fill="#4a5568" font-size="10">Claude trabalhando</text>

  <!-- How it works section -->
  <rect x="60" y="200" width="740" height="220" rx="12" fill="#16181f" stroke="#2d3748" stroke-width="1"/>
  <text x="430" y="226" text-anchor="middle" fill="#fbd38d" font-size="13" font-weight="700">Como Configurar uma Routine</text>

  <!-- Step 1 -->
  <rect x="80" y="240" width="200" height="70" rx="8" fill="#1a1a2e" stroke="#b794f4" stroke-width="1"/>
  <text x="180" y="262" text-anchor="middle" fill="#b794f4" font-size="11" font-weight="700">① Configure</text>
  <text x="180" y="280" text-anchor="middle" fill="#a0aec0" font-size="10">Prompt + schedule</text>
  <text x="180" y="296" text-anchor="middle" fill="#718096" font-size="10">+ permissões mínimas</text>
  <text x="180" y="308" text-anchor="middle" fill="#718096" font-size="9">Uma vez só</text>

  <line x1="280" y1="275" x2="320" y2="275" stroke="#b794f4" stroke-width="1.5" marker-end="url(#rArr)"/>

  <!-- Step 2 -->
  <rect x="320" y="240" width="200" height="70" rx="8" fill="#1a3a5c" stroke="#4a9eff" stroke-width="1"/>
  <text x="420" y="262" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="700">② Anthropic Hospeda</text>
  <text x="420" y="280" text-anchor="middle" fill="#a0aec0" font-size="10">Cloud, sem seu PC</text>
  <text x="420" y="296" text-anchor="middle" fill="#a0aec0" font-size="10">ligado</text>
  <text x="420" y="308" text-anchor="middle" fill="#718096" font-size="9">Automático</text>

  <line x1="520" y1="275" x2="560" y2="275" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#rArrB)"/>

  <!-- Step 3 -->
  <rect x="560" y="240" width="220" height="70" rx="8" fill="#1a4a2e" stroke="#48bb78" stroke-width="1"/>
  <text x="670" y="262" text-anchor="middle" fill="#48bb78" font-size="11" font-weight="700">③ Você Vê o Resultado</text>
  <text x="670" y="280" text-anchor="middle" fill="#a0aec0" font-size="10">PR aberto, issue criada,</text>
  <text x="670" y="296" text-anchor="middle" fill="#a0aec0" font-size="10">Slack notificado</text>
  <text x="670" y="308" text-anchor="middle" fill="#718096" font-size="9">Ao acordar</text>

  <!-- Warning -->
  <rect x="80" y="326" width="700" height="76" rx="8" fill="#2a1a00"/>
  <text x="430" y="348" text-anchor="middle" fill="#fbd38d" font-size="12" font-weight="700">⚠️ Regra de Ouro para Routines</text>
  <text x="430" y="368" text-anchor="middle" fill="#a0aec0" font-size="11">Permissões MÍNIMAS. Nunca dê acesso de escrita em produção.</text>
  <text x="430" y="386" text-anchor="middle" fill="#a0aec0" font-size="11">Nunca deixe merge automático. Routine sugere → humano decide.</text>

  <defs>
    <marker id="rArr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#b794f4"/></marker>
    <marker id="rArrB" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/></marker>
  </defs>
</svg>
