<svg viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="860" height="480" fill="#0f1117" rx="16"/>
  <text x="430" y="40" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Subagents — Times de IA Trabalhando em Paralelo</text>
  <text x="430" y="62" text-anchor="middle" fill="#718096" font-size="12">Cada subagent tem seu próprio contexto limpo — sem viés, sem interferência</text>

  <!-- Main agent -->
  <rect x="300" y="88" width="260" height="70" rx="12" fill="#1a1a2e" stroke="#b794f4" stroke-width="2"/>
  <text x="430" y="114" text-anchor="middle" fill="#b794f4" font-size="13" font-weight="700">🧠 Agente Principal</text>
  <text x="430" y="132" text-anchor="middle" fill="#a0aec0" font-size="11">Planeja, distribui e integra</text>
  <text x="430" y="148" text-anchor="middle" fill="#718096" font-size="10">"Modernize o módulo de autenticação"</text>

  <!-- Arrows down to subagents -->
  <line x1="340" y1="158" x2="160" y2="220" stroke="#b794f4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sArr)"/>
  <line x1="390" y1="158" x2="340" y2="220" stroke="#b794f4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sArr)"/>
  <line x1="470" y1="158" x2="520" y2="220" stroke="#b794f4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sArr)"/>
  <line x1="520" y1="158" x2="700" y2="220" stroke="#b794f4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sArr)"/>

  <!-- Subagent A: Analysis -->
  <rect x="60" y="222" width="180" height="80" rx="10" fill="#1a3a5c" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="150" y="246" text-anchor="middle" fill="#4a9eff" font-size="12" font-weight="700">🔍 Análise</text>
  <text x="150" y="264" text-anchor="middle" fill="#a0aec0" font-size="10">Mapeia dependências</text>
  <text x="150" y="280" text-anchor="middle" fill="#a0aec0" font-size="10">e impacto da mudança</text>
  <text x="150" y="296" text-anchor="middle" fill="#718096" font-size="10">Contexto isolado ✓</text>

  <!-- Subagent B: Implementation -->
  <rect x="260" y="222" width="180" height="80" rx="10" fill="#1a4a2e" stroke="#48bb78" stroke-width="1.5"/>
  <text x="350" y="246" text-anchor="middle" fill="#48bb78" font-size="12" font-weight="700">⚙️ Implementação</text>
  <text x="350" y="264" text-anchor="middle" fill="#a0aec0" font-size="10">JWT refresh tokens</text>
  <text x="350" y="280" text-anchor="middle" fill="#a0aec0" font-size="10">+ rate limiting</text>
  <text x="350" y="296" text-anchor="middle" fill="#718096" font-size="10">Contexto isolado ✓</text>

  <!-- Subagent C: Tests -->
  <rect x="460" y="222" width="180" height="80" rx="10" fill="#3a1a4a" stroke="#9f7aea" stroke-width="1.5"/>
  <text x="550" y="246" text-anchor="middle" fill="#9f7aea" font-size="12" font-weight="700">🧪 Testes</text>
  <text x="550" y="264" text-anchor="middle" fill="#a0aec0" font-size="10">Escreve unit tests</text>
  <text x="550" y="280" text-anchor="middle" fill="#a0aec0" font-size="10">+ integration tests</text>
  <text x="550" y="296" text-anchor="middle" fill="#718096" font-size="10">Contexto isolado ✓</text>

  <!-- Subagent D: Review -->
  <rect x="660" y="222" width="160" height="80" rx="10" fill="#4a2a1a" stroke="#ed8936" stroke-width="1.5"/>
  <text x="740" y="246" text-anchor="middle" fill="#ed8936" font-size="12" font-weight="700">👁️ Review</text>
  <text x="740" y="264" text-anchor="middle" fill="#a0aec0" font-size="10">Code review com</text>
  <text x="740" y="280" text-anchor="middle" fill="#a0aec0" font-size="10">zero viés</text>
  <text x="740" y="296" text-anchor="middle" fill="#718096" font-size="10">Contexto isolado ✓</text>

  <!-- Parallel execution label -->
  <rect x="60" y="316" width="760" height="24" rx="6" fill="#1a1a1a" stroke="#2d3748" stroke-width="1"/>
  <text x="430" y="332" text-anchor="middle" fill="#fbd38d" font-size="11">⚡ Todos executam em paralelo — ao mesmo tempo, cada um no seu contexto limpo</text>

  <!-- Arrows up back to main -->
  <line x1="150" y1="356" x2="340" y2="390" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#sArrB)"/>
  <line x1="350" y1="356" x2="390" y2="390" stroke="#48bb78" stroke-width="1.5" marker-end="url(#sArrG)"/>
  <line x1="550" y1="356" x2="470" y2="390" stroke="#9f7aea" stroke-width="1.5" marker-end="url(#sArrP)"/>
  <line x1="740" y1="356" x2="520" y2="390" stroke="#ed8936" stroke-width="1.5" marker-end="url(#sArrO)"/>

  <!-- Merge box -->
  <rect x="270" y="392" width="320" height="60" rx="10" fill="#1a1a2e" stroke="#b794f4" stroke-width="2"/>
  <text x="430" y="415" text-anchor="middle" fill="#b794f4" font-size="12" font-weight="700">🧠 Agente Principal Integra</text>
  <text x="430" y="433" text-anchor="middle" fill="#a0aec0" font-size="11">Combina resultados → resolve conflitos → abre PR final</text>
  <text x="430" y="448" text-anchor="middle" fill="#718096" font-size="10">Tempo total: ~15 min | Sem subagents: 3-4 horas</text>

  <defs>
    <marker id="sArr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#b794f4"/></marker>
    <marker id="sArrB" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/></marker>
    <marker id="sArrG" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#48bb78"/></marker>
    <marker id="sArrP" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#9f7aea"/></marker>
    <marker id="sArrO" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ed8936"/></marker>
  </defs>
</svg>
