<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="860" height="460" fill="#0f1117" rx="16"/>
  <text x="430" y="40" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Hooks — Middleware para o Fluxo do Claude</text>
  <text x="430" y="62" text-anchor="middle" fill="#718096" font-size="12">Scripts que executam automaticamente em cada ação — você define as regras, Claude obedece</text>

  <!-- Flow -->
  <!-- Claude wants to act -->
  <rect x="330" y="90" width="200" height="54" rx="10" fill="#1a1a2e" stroke="#b794f4" stroke-width="1.5"/>
  <text x="430" y="114" text-anchor="middle" fill="#b794f4" font-size="13" font-weight="700">🤖 Claude quer agir</text>
  <text x="430" y="132" text-anchor="middle" fill="#718096" font-size="11">ex: editar um arquivo</text>
  <line x1="430" y1="144" x2="430" y2="168" stroke="#718096" stroke-width="1.5" marker-end="url(#bArr)"/>

  <!-- PreToolUse -->
  <rect x="270" y="170" width="320" height="54" rx="10" fill="#4a2a1a" stroke="#ed8936" stroke-width="2"/>
  <text x="430" y="194" text-anchor="middle" fill="#ed8936" font-size="13" font-weight="700">🪝 PreToolUse Hook dispara</text>
  <text x="430" y="212" text-anchor="middle" fill="#a0aec0" font-size="11">Seu script verifica: é seguro? Está no padrão?</text>

  <!-- Decision -->
  <line x1="430" y1="224" x2="430" y2="248" stroke="#ed8936" stroke-width="1.5" marker-end="url(#bArr)"/>
  <polygon points="430,250 370,285 430,320 490,285" fill="#1a1a1a" stroke="#fbd38d" stroke-width="1.5"/>
  <text x="430" y="290" text-anchor="middle" fill="#fbd38d" font-size="12" font-weight="700">Exit code?</text>

  <!-- Block path -->
  <line x1="370" y1="285" x2="160" y2="285" stroke="#fc8181" stroke-width="1.5" marker-end="url(#bArrR)"/>
  <rect x="40" y="258" width="120" height="54" rx="10" fill="#4a1a1a" stroke="#fc8181" stroke-width="1.5"/>
  <text x="100" y="280" text-anchor="middle" fill="#fc8181" font-size="12" font-weight="700">Exit 1</text>
  <text x="100" y="296" text-anchor="middle" fill="#a0aec0" font-size="11">❌ BLOQUEADO</text>
  <text x="100" y="310" text-anchor="middle" fill="#718096" font-size="10">Claude recebe o erro</text>

  <!-- Allow path -->
  <line x1="490" y1="285" x2="700" y2="285" stroke="#48bb78" stroke-width="1.5" marker-end="url(#bArrG)"/>
  <rect x="700" y="258" width="120" height="54" rx="10" fill="#1a4a2e" stroke="#48bb78" stroke-width="1.5"/>
  <text x="760" y="280" text-anchor="middle" fill="#48bb78" font-size="12" font-weight="700">Exit 0</text>
  <text x="760" y="296" text-anchor="middle" fill="#a0aec0" font-size="11">✅ PERMITIDO</text>
  <text x="760" y="310" text-anchor="middle" fill="#718096" font-size="10">Ação executada</text>

  <!-- PostToolUse -->
  <line x1="760" y1="312" x2="760" y2="348" stroke="#48bb78" stroke-width="1.5"/>
  <line x1="760" y1="348" x2="530" y2="348" stroke="#48bb78" stroke-width="1.5" marker-end="url(#bArrG)"/>
  <rect x="270" y="330" width="260" height="54" rx="10" fill="#1a4a2e" stroke="#48bb78" stroke-width="1.5"/>
  <text x="400" y="354" text-anchor="middle" fill="#48bb78" font-size="12" font-weight="700">🪝 PostToolUse Hook</text>
  <text x="400" y="372" text-anchor="middle" fill="#a0aec0" font-size="11">Lint automático, log de auditoria, notificação</text>

  <!-- Use cases -->
  <rect x="40" y="380" width="780" height="60" rx="10" fill="#16181f"/>
  <text x="430" y="402" text-anchor="middle" fill="#fbd38d" font-size="11" font-weight="700">Casos de Uso Reais</text>
  <text x="120" y="424" text-anchor="middle" fill="#fc8181" font-size="11">🔒 Bloquear rm -rf</text>
  <text x="280" y="424" text-anchor="middle" fill="#fc8181" font-size="11">🔑 Detectar secrets</text>
  <text x="440" y="424" text-anchor="middle" fill="#48bb78" font-size="11">✅ Lint após edição</text>
  <text x="600" y="424" text-anchor="middle" fill="#4a9eff" font-size="11">🔔 Desktop alert</text>
  <text x="740" y="424" text-anchor="middle" fill="#b794f4" font-size="11">📝 Auditoria total</text>

  <defs>
    <marker id="bArr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#718096"/></marker>
    <marker id="bArrR" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#fc8181"/></marker>
    <marker id="bArrG" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#48bb78"/></marker>
  </defs>
</svg>
