<svg viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="480" fill="#F0EEE6"/>
  <text x="60" y="58" fill="#1F1E1D" font-family="Georgia, serif" font-size="27">Hooks — middleware para o fluxo do Claude</text>
  <text x="60" y="84" fill="#73726C" font-family="Arial, sans-serif" font-size="14">Scripts que executam em cada ação: você define as regras, o Claude obedece</text>
  <line x1="60" y1="100" x2="800" y2="100" stroke="#DAD6C9" stroke-width="1"/>

  <!-- Claude acts -->
  <rect x="330" y="120" width="200" height="52" rx="12" fill="#CC785C"/>
  <text x="430" y="144" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="13" font-weight="700">🤖 Claude quer agir</text>
  <text x="430" y="162" text-anchor="middle" fill="#F3DCCF" font-family="Arial, sans-serif" font-size="11">ex.: editar um arquivo</text>
  <line x1="430" y1="172" x2="430" y2="194" stroke="#B0ADA3" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- PreToolUse -->
  <rect x="270" y="196" width="320" height="52" rx="12" fill="#FAF9F5" stroke="#AB5A38" stroke-width="1.5"/>
  <text x="430" y="220" text-anchor="middle" fill="#AB5A38" font-family="Arial, sans-serif" font-size="13" font-weight="700">🪝 Hook PreToolUse dispara</text>
  <text x="430" y="238" text-anchor="middle" fill="#3D3C39" font-family="Arial, sans-serif" font-size="11.5">Seu script verifica: é seguro? Está no padrão?</text>
  <line x1="430" y1="248" x2="430" y2="268" stroke="#B0ADA3" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- Decision diamond -->
  <polygon points="430,270 372,304 430,338 488,304" fill="#EDE7DB" stroke="#B98E5E" stroke-width="1.5"/>
  <text x="430" y="309" text-anchor="middle" fill="#8C6638" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">Exit code?</text>

  <!-- Block path -->
  <line x1="372" y1="304" x2="190" y2="304" stroke="#A23B2A" stroke-width="1.5" marker-end="url(#r)"/>
  <rect x="60" y="278" width="125" height="52" rx="12" fill="#F4E4DD" stroke="#A23B2A" stroke-width="1.5"/>
  <text x="122" y="300" text-anchor="middle" fill="#A23B2A" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">exit 1</text>
  <text x="122" y="318" text-anchor="middle" fill="#7A3023" font-family="Arial, sans-serif" font-size="11">❌ Bloqueado</text>

  <!-- Allow path -->
  <line x1="488" y1="304" x2="670" y2="304" stroke="#5E7345" stroke-width="1.5" marker-end="url(#s)"/>
  <rect x="675" y="278" width="125" height="52" rx="12" fill="#E8ECDD" stroke="#5E7345" stroke-width="1.5"/>
  <text x="737" y="300" text-anchor="middle" fill="#5E7345" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">exit 0</text>
  <text x="737" y="318" text-anchor="middle" fill="#46562F" font-family="Arial, sans-serif" font-size="11">✅ Permitido</text>

  <!-- PostToolUse -->
  <line x1="737" y1="330" x2="737" y2="360" stroke="#5E7345" stroke-width="1.5"/>
  <line x1="737" y1="360" x2="590" y2="360" stroke="#5E7345" stroke-width="1.5" marker-end="url(#s)"/>
  <rect x="270" y="338" width="320" height="44" rx="12" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
  <text x="430" y="364" text-anchor="middle" fill="#5E7345" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">🪝 Hook PostToolUse: lint, log, notificação</text>

  <!-- Use cases -->
  <rect x="60" y="404" width="740" height="58" rx="12" fill="#2B2A27"/>
  <text x="430" y="426" text-anchor="middle" fill="#E0996F" font-family="Georgia, serif" font-size="14">Casos de uso reais</text>
  <text x="135" y="448" text-anchor="middle" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="11.5">🔒 Bloquear rm -rf</text>
  <text x="295" y="448" text-anchor="middle" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="11.5">🔑 Detectar secrets</text>
  <text x="455" y="448" text-anchor="middle" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="11.5">✅ Lint após edição</text>
  <text x="615" y="448" text-anchor="middle" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="11.5">🔔 Notificar conclusão</text>
  <text x="745" y="448" text-anchor="middle" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="11.5">📝 Auditoria</text>

  <defs>
    <marker id="g" markerWidth="9" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#B0ADA3"/></marker>
    <marker id="r" markerWidth="9" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#A23B2A"/></marker>
    <marker id="s" markerWidth="9" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5E7345"/></marker>
  </defs>
</svg>
