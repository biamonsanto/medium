<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Claude Code — Os 10 Níveis de Domínio</text>
  <text x="450" y="72" text-anchor="middle" fill="#8b8fa8" font-size="13">Cada nível multiplica o anterior. Onde você está agora?</text>

  <!-- Level cards -->
  <!-- Lvl 1 -->
  <rect x="40" y="100" width="76" height="76" rx="12" fill="#1a3a5c"/>
  <text x="78" y="128" text-anchor="middle" fill="#4a9eff" font-size="10" font-weight="600">LVL 1</text>
  <text x="78" y="150" text-anchor="middle" font-size="28">💻</text>
  <text x="78" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">Terminal</text>

  <!-- Lvl 2 -->
  <rect x="136" y="100" width="76" height="76" rx="12" fill="#1a3a5c"/>
  <text x="174" y="128" text-anchor="middle" fill="#4a9eff" font-size="10" font-weight="600">LVL 2</text>
  <text x="174" y="150" text-anchor="middle" font-size="28">🧠</text>
  <text x="174" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">Memory</text>

  <!-- Lvl 3 -->
  <rect x="232" y="100" width="76" height="76" rx="12" fill="#1a3a5c"/>
  <text x="270" y="128" text-anchor="middle" fill="#4a9eff" font-size="10" font-weight="600">LVL 3</text>
  <text x="270" y="150" text-anchor="middle" font-size="28">⚡</text>
  <text x="270" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">Commands</text>

  <!-- Lvl 4 -->
  <rect x="328" y="100" width="76" height="76" rx="12" fill="#1a4a2e"/>
  <text x="366" y="128" text-anchor="middle" fill="#48bb78" font-size="10" font-weight="600">LVL 4</text>
  <text x="366" y="150" text-anchor="middle" font-size="28">⚙️</text>
  <text x="366" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">Custom</text>

  <!-- Lvl 5 -->
  <rect x="424" y="100" width="76" height="76" rx="12" fill="#1a4a2e"/>
  <text x="462" y="128" text-anchor="middle" fill="#48bb78" font-size="10" font-weight="600">LVL 5</text>
  <text x="462" y="150" text-anchor="middle" font-size="28">🎯</text>
  <text x="462" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">Skills</text>

  <!-- Lvl 6 -->
  <rect x="520" y="100" width="76" height="76" rx="12" fill="#3a1a4a"/>
  <text x="558" y="128" text-anchor="middle" fill="#b794f4" font-size="10" font-weight="600">LVL 6</text>
  <text x="558" y="150" text-anchor="middle" font-size="28">🔌</text>
  <text x="558" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">MCP</text>

  <!-- Lvl 7 -->
  <rect x="616" y="100" width="76" height="76" rx="12" fill="#3a1a4a"/>
  <text x="654" y="128" text-anchor="middle" fill="#b794f4" font-size="10" font-weight="600">LVL 7</text>
  <text x="654" y="150" text-anchor="middle" font-size="28">🤖</text>
  <text x="654" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">Subagents</text>

  <!-- Lvl 8 -->
  <rect x="712" y="100" width="76" height="76" rx="12" fill="#4a2a1a"/>
  <text x="750" y="128" text-anchor="middle" fill="#ed8936" font-size="10" font-weight="600">LVL 8</text>
  <text x="750" y="150" text-anchor="middle" font-size="28">🪝</text>
  <text x="750" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">Hooks</text>

  <!-- Lvl 9 -->
  <rect x="808" y="100" width="76" height="76" rx="12" fill="#4a1a1a"/>
  <text x="846" y="128" text-anchor="middle" fill="#fc8181" font-size="10" font-weight="600">LVL 9</text>
  <text x="846" y="150" text-anchor="middle" font-size="28">👻</text>
  <text x="846" y="192" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">Headless</text>

  <!-- Lvl 10 — special highlighted -->
  <rect x="350" y="220" width="200" height="100" rx="16" fill="url(#goldGrad)" opacity="0.95"/>
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#744210"/>
      <stop offset="100%" stop-color="#b7791f"/>
    </linearGradient>
  </defs>
  <text x="450" y="252" text-anchor="middle" fill="#fbd38d" font-size="13" font-weight="700">LVL 10 — MÁXIMO</text>
  <text x="450" y="280" text-anchor="middle" font-size="36">🔄</text>
  <text x="450" y="310" text-anchor="middle" fill="#fef3c7" font-size="15" font-weight="700">Routines</text>

  <!-- Description boxes -->
  <!-- Row 1 descriptions -->
  <rect x="40" y="360" width="820" height="130" rx="12" fill="#16181f"/>
  <text x="60" y="390" fill="#4a9eff" font-size="12" font-weight="700">💻 Nível 1-3 — Fundação</text>
  <text x="60" y="412" fill="#718096" font-size="12">Terminal: Claude como assistente de código local. Memory: CLAUDE.md persiste contexto entre sessões.</text>
  <text x="60" y="430" fill="#718096" font-size="12">Commands: /slash commands automatizam tarefas repetidas. Aqui você economiza 1-2h/semana.</text>
  <text x="60" y="458" fill="#48bb78" font-size="12" font-weight="700">🎯 Nível 4-5 — Automação</text>
  <text x="60" y="478" fill="#718096" font-size="12">Custom config + Skills transformam Claude em especialista do seu projeto. Ele aprende seus padrões.</text>

  <!-- Progress bar -->
  <rect x="40" y="500" width="820" height="6" rx="3" fill="#2d3748"/>
  <rect x="40" y="500" width="82" height="6" rx="3" fill="#4a9eff"/>
  <text x="870" y="511" text-anchor="end" fill="#4a9eff" font-size="10">10%</text>
</svg>
