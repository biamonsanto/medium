<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="560" fill="#F0EEE6"/>

  <!-- Title -->
  <text x="60" y="64" fill="#1F1E1D" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400">Os 10 Níveis de Domínio do Claude Code</text>
  <text x="60" y="92" fill="#73726C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Cada nível multiplica o anterior. Onde você está agora?</text>
  <line x1="60" y1="110" x2="840" y2="110" stroke="#DAD6C9" stroke-width="1"/>

  <!-- Level cards row -->
  <!-- card helper: x positions -->
  <!-- Lvl 1 -->
  <rect x="60" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="60" y="140" width="72" height="6" rx="3" fill="#CC785C"/>
  <text x="96" y="172" text-anchor="middle" fill="#CC785C" font-family="Arial, sans-serif" font-size="11" font-weight="700">01</text>
  <text x="96" y="200" text-anchor="middle" font-size="22">💻</text>
  <text x="96" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">Terminal</text>

  <!-- Lvl 2 -->
  <rect x="138" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="138" y="140" width="72" height="6" rx="3" fill="#CC785C"/>
  <text x="174" y="172" text-anchor="middle" fill="#CC785C" font-family="Arial, sans-serif" font-size="11" font-weight="700">02</text>
  <text x="174" y="200" text-anchor="middle" font-size="22">🧠</text>
  <text x="174" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">Memory</text>

  <!-- Lvl 3 -->
  <rect x="216" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="216" y="140" width="72" height="6" rx="3" fill="#CC785C"/>
  <text x="252" y="172" text-anchor="middle" fill="#CC785C" font-family="Arial, sans-serif" font-size="11" font-weight="700">03</text>
  <text x="252" y="200" text-anchor="middle" font-size="22">⚡</text>
  <text x="252" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">Commands</text>

  <!-- Lvl 4 -->
  <rect x="294" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="294" y="140" width="72" height="6" rx="3" fill="#BC6A4E"/>
  <text x="330" y="172" text-anchor="middle" fill="#BC6A4E" font-family="Arial, sans-serif" font-size="11" font-weight="700">04</text>
  <text x="330" y="200" text-anchor="middle" font-size="22">⚙️</text>
  <text x="330" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">Custom</text>

  <!-- Lvl 5 -->
  <rect x="372" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="372" y="140" width="72" height="6" rx="3" fill="#BC6A4E"/>
  <text x="408" y="172" text-anchor="middle" fill="#BC6A4E" font-family="Arial, sans-serif" font-size="11" font-weight="700">05</text>
  <text x="408" y="200" text-anchor="middle" font-size="22">🎯</text>
  <text x="408" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">Skills</text>

  <!-- Lvl 6 -->
  <rect x="450" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="450" y="140" width="72" height="6" rx="3" fill="#AB5A38"/>
  <text x="486" y="172" text-anchor="middle" fill="#AB5A38" font-family="Arial, sans-serif" font-size="11" font-weight="700">06</text>
  <text x="486" y="200" text-anchor="middle" font-size="22">🔌</text>
  <text x="486" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">MCP</text>

  <!-- Lvl 7 -->
  <rect x="528" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="528" y="140" width="72" height="6" rx="3" fill="#AB5A38"/>
  <text x="564" y="172" text-anchor="middle" fill="#AB5A38" font-family="Arial, sans-serif" font-size="11" font-weight="700">07</text>
  <text x="564" y="200" text-anchor="middle" font-size="22">🤖</text>
  <text x="564" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">Subagents</text>

  <!-- Lvl 8 -->
  <rect x="606" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="606" y="140" width="72" height="6" rx="3" fill="#94492E"/>
  <text x="642" y="172" text-anchor="middle" fill="#94492E" font-family="Arial, sans-serif" font-size="11" font-weight="700">08</text>
  <text x="642" y="200" text-anchor="middle" font-size="22">🪝</text>
  <text x="642" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">Hooks</text>

  <!-- Lvl 9 -->
  <rect x="684" y="140" width="72" height="90" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <rect x="684" y="140" width="72" height="6" rx="3" fill="#94492E"/>
  <text x="720" y="172" text-anchor="middle" fill="#94492E" font-family="Arial, sans-serif" font-size="11" font-weight="700">09</text>
  <text x="720" y="200" text-anchor="middle" font-size="22">👻</text>
  <text x="720" y="222" text-anchor="middle" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="11">Headless</text>

  <!-- Lvl 10 highlighted -->
  <rect x="762" y="140" width="78" height="90" rx="10" fill="#CC785C"/>
  <text x="801" y="172" text-anchor="middle" fill="#F7E9DF" font-family="Arial, sans-serif" font-size="11" font-weight="700">10</text>
  <text x="801" y="200" text-anchor="middle" font-size="22">🔄</text>
  <text x="801" y="222" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="11" font-weight="700">Routines</text>

  <!-- Three grouping bands -->
  <!-- Foundation -->
  <rect x="60" y="270" width="250" height="240" rx="14" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <circle cx="86" cy="300" r="5" fill="#CC785C"/>
  <text x="102" y="305" fill="#1F1E1D" font-family="Georgia, serif" font-size="17" font-weight="400">Fundação</text>
  <text x="84" y="328" fill="#73726C" font-family="Arial, sans-serif" font-size="12">Níveis 1–3</text>
  <text x="84" y="360" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">Claude como assistente local.</text>
  <text x="84" y="380" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">O CLAUDE.md guarda o contexto</text>
  <text x="84" y="400" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">entre as sessões, e os slash</text>
  <text x="84" y="420" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">commands automatizam as tarefas</text>
  <text x="84" y="440" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">repetidas.</text>
  <text x="84" y="478" fill="#CC785C" font-family="Arial, sans-serif" font-size="12" font-weight="700">Ganho: 1–2 h por semana</text>

  <!-- Automation -->
  <rect x="325" y="270" width="250" height="240" rx="14" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <circle cx="351" cy="300" r="5" fill="#AB5A38"/>
  <text x="367" y="305" fill="#1F1E1D" font-family="Georgia, serif" font-size="17" font-weight="400">Automação</text>
  <text x="349" y="328" fill="#73726C" font-family="Arial, sans-serif" font-size="12">Níveis 4–7</text>
  <text x="349" y="360" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">Configuração, skills, MCP e</text>
  <text x="349" y="380" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">subagentes transformam o Claude</text>
  <text x="349" y="400" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">em um especialista do seu projeto,</text>
  <text x="349" y="420" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">conectado aos seus sistemas e</text>
  <text x="349" y="440" fill="#3D3C39" font-family="Arial, sans-serif" font-size="12.5">trabalhando em paralelo.</text>
  <text x="349" y="478" fill="#AB5A38" font-family="Arial, sans-serif" font-size="12" font-weight="700">Ganho: 3–5 h por semana</text>

  <!-- Autonomy -->
  <rect x="590" y="270" width="250" height="240" rx="14" fill="#2B2A27"/>
  <circle cx="616" cy="300" r="5" fill="#E0996F"/>
  <text x="632" y="305" fill="#F5F2EA" font-family="Georgia, serif" font-size="17" font-weight="400">Autonomia</text>
  <text x="614" y="328" fill="#A5A299" font-family="Arial, sans-serif" font-size="12">Níveis 8–10</text>
  <text x="614" y="360" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12.5">Hooks garantem segurança, o modo</text>
  <text x="614" y="380" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12.5">headless integra ao CI/CD e as</text>
  <text x="614" y="400" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12.5">routines rodam na nuvem — sem o</text>
  <text x="614" y="420" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12.5">seu computador ligado, enquanto</text>
  <text x="614" y="440" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12.5">você dorme.</text>
  <text x="614" y="478" fill="#E0996F" font-family="Arial, sans-serif" font-size="12" font-weight="700">Ganho: 5–8 h por semana</text>

  <!-- Footer -->
  <text x="60" y="544" fill="#A5A299" font-family="Arial, sans-serif" font-size="11">Claude Code · Guia de domínio 2026</text>
</svg>
