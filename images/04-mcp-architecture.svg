<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="500" fill="#F0EEE6"/>
  <text x="60" y="58" fill="#1F1E1D" font-family="Georgia, serif" font-size="27">MCP — Claude conectado ao mundo real</text>
  <text x="60" y="84" fill="#73726C" font-family="Arial, sans-serif" font-size="14">O protocolo que transforma o Claude em um orquestrador dos seus sistemas</text>
  <line x1="60" y1="100" x2="800" y2="100" stroke="#DAD6C9" stroke-width="1"/>

  <!-- Center: Claude -->
  <rect x="340" y="190" width="180" height="96" rx="16" fill="#CC785C"/>
  <text x="430" y="228" text-anchor="middle" font-size="30">🤖</text>
  <text x="430" y="254" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, serif" font-size="17">Claude Code</text>
  <text x="430" y="274" text-anchor="middle" fill="#F3DCCF" font-family="Arial, sans-serif" font-size="11.5">Terminal · IDE</text>

  <!-- connectors left -->
  <line x1="200" y1="160" x2="340" y2="215" stroke="#C9A98E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="200" y1="238" x2="340" y2="238" stroke="#C9A98E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="200" y1="316" x2="340" y2="262" stroke="#C9A98E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- connectors right -->
  <line x1="660" y1="160" x2="520" y2="215" stroke="#C9A98E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="660" y1="238" x2="520" y2="238" stroke="#C9A98E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="660" y1="316" x2="520" y2="262" stroke="#C9A98E" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- GitHub -->
  <rect x="55" y="130" width="150" height="62" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="80" y="158" font-size="20">🐙</text>
  <text x="112" y="156" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">GitHub MCP</text>
  <text x="112" y="174" fill="#8C8A82" font-family="Arial, sans-serif" font-size="10.5">PRs · Issues · Commits</text>

  <!-- Database -->
  <rect x="55" y="208" width="150" height="62" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="80" y="236" font-size="20">🗄️</text>
  <text x="112" y="234" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">Database MCP</text>
  <text x="112" y="252" fill="#8C8A82" font-family="Arial, sans-serif" font-size="10.5">PostgreSQL · MySQL</text>

  <!-- Slack -->
  <rect x="55" y="286" width="150" height="62" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="80" y="314" font-size="20">💬</text>
  <text x="112" y="312" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">Slack MCP</text>
  <text x="112" y="330" fill="#8C8A82" font-family="Arial, sans-serif" font-size="10.5">Canais · Alertas</text>

  <!-- Browser -->
  <rect x="655" y="130" width="150" height="62" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="680" y="158" font-size="20">🌐</text>
  <text x="712" y="156" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">Browser MCP</text>
  <text x="712" y="174" fill="#8C8A82" font-family="Arial, sans-serif" font-size="10.5">Playwright</text>

  <!-- Linear -->
  <rect x="655" y="208" width="150" height="62" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="680" y="236" font-size="20">📋</text>
  <text x="712" y="234" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">Linear MCP</text>
  <text x="712" y="252" fill="#8C8A82" font-family="Arial, sans-serif" font-size="10.5">Tickets · Sprints</text>

  <!-- Custom -->
  <rect x="655" y="286" width="150" height="62" rx="10" fill="#FAF9F5" stroke="#E3DECF" stroke-width="1"/>
  <text x="680" y="314" font-size="20">⚙️</text>
  <text x="712" y="312" fill="#1F1E1D" font-family="Arial, sans-serif" font-size="12.5" font-weight="700">MCP custom</text>
  <text x="712" y="330" fill="#8C8A82" font-family="Arial, sans-serif" font-size="10.5">Sistema interno</text>

  <!-- Workflow strip -->
  <rect x="60" y="378" width="740" height="106" rx="14" fill="#2B2A27"/>
  <text x="84" y="406" fill="#E0996F" font-family="Georgia, serif" font-size="15">Exemplo: da issue ao PR em 10 minutos</text>
  <text x="84" y="432" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12">1 · Lê a issue #412 no GitHub MCP</text>
  <text x="84" y="452" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12">2 · Consulta os dados afetados no Database MCP</text>
  <text x="430" y="432" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12">3 · Implementa a correção e roda os testes</text>
  <text x="430" y="452" fill="#D9D6CC" font-family="Arial, sans-serif" font-size="12">4 · Abre o PR no GitHub e avisa no Slack #dev</text>
  <text x="84" y="474" fill="#8C8A82" font-family="Arial, sans-serif" font-size="11">Sem MCP: ~95 min · Com MCP: ~12 min</text>
</svg>
